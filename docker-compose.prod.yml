# HTTPS front-end for production VPS deployments.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Caddy obtains and renews Let's Encrypt certificates automatically.
services:
  app:
    ports: []          # no longer exposed directly; Caddy fronts it

  caddy:
    image: caddy:2-alpine
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env (e.g. sgrhp.example.com)}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
