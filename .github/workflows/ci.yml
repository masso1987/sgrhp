name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - name: Syntax check
        run: for f in $(find src db -name '*.js'); do node --check "$f"; done
      - name: Run full test suite (159 checks)
        run: bash test/run-all.sh
      - name: Build Docker image
        run: docker build -t sgrhp:${{ github.sha }} .
