<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGRHP — Cible RH Emploi S.A.</title>
<style>
:root{--primary:#1e3a5f;--accent:#e8833a;--bg:#f4f6f9;--border:#e2e8f0;--muted:#6b7280;
--green:#16a34a;--red:#dc2626;--amber:#d97706;--green-bg:#dcfce7;--red-bg:#fee2e2;--amber-bg:#fef3c7}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:#1f2937;font-size:14px}
.topbar{background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;position:fixed;top:0;left:0;right:0;z-index:50}
.logo{font-weight:700}.logo .b{background:var(--accent);font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px}
.layout{display:flex;padding-top:54px;min-height:100vh}
.sidebar{width:210px;background:#fff;border-right:1px solid var(--border);position:fixed;top:54px;bottom:0;padding:10px 0}
.nav{padding:10px 18px;cursor:pointer;color:var(--muted);font-weight:500;border-left:3px solid transparent}
.nav:hover{background:var(--bg)}.nav.active{color:var(--primary);border-left-color:var(--accent);background:#eef2f7;font-weight:600}
.main{margin-left:210px;padding:22px;flex:1}
h1{font-size:19px;margin-bottom:14px}
.panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);padding:7px 9px;border-bottom:2px solid var(--border)}
td{padding:8px 9px;border-bottom:1px solid var(--border)}
.tag{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600}
.tag.green{background:var(--green-bg);color:var(--green)}.tag.red{background:var(--red-bg);color:var(--red)}
.tag.amber{background:var(--amber-bg);color:var(--amber)}.tag.gray{background:#f3f4f6;color:var(--muted)}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-weight:600;font-size:13px}
.btn.p{background:var(--primary);color:#fff}.btn.ghost{background:none;border:1px solid var(--border)}
.btn.sm{padding:4px 10px;font-size:12px}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;margin-bottom:8px}
label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.err{color:var(--red);font-size:12px;margin:6px 0}
#login{max-width:360px;margin:110px auto;background:#fff;border:1px solid var(--border);border-radius:12px;padding:26px}
#login h1{text-align:center}.hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.7}
.chk{display:flex;gap:8px;align-items:center;padding:6px 8px;font-size:13px}
.chk input{width:15px;height:15px;margin:0;accent-color:var(--primary)}
.doc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.note{background:var(--amber-bg);border:1px solid #fcd34d;border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:12px}
.hidden{display:none!important}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:20px;width:440px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column}
.modal .scroll{overflow-y:auto;flex:1;border:1px solid var(--border);border-radius:8px;padding:6px;margin:10px 0}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px}
.card .kpi{font-size:24px;font-weight:700}
.card .lbl{color:var(--muted);font-size:12px;margin-top:2px}
</style>
</head>
<body>

<div id="login">
  <h1>◆ SGRHP</h1>
  <p style="text-align:center;color:var(--muted);margin-bottom:16px">Cible RH Emploi S.A.</p>
  <label>Email</label><input id="lEmail" value="gpf@cible-rh.ci">
  <label>Mot de passe</label><input id="lPass" type="password" value="demo123">
  <div class="err hidden" id="lErr"></div>
  <button class="btn p" style="width:100%" onclick="doLogin()">Se connecter</button>
  <div class="hint">Comptes de démonstration (mot de passe <b>demo123</b>) :<br>
  gpf@cible-rh.ci · cd@cible-rh.ci · rj@cible-rh.ci · ui@cible-rh.ci · admin@cible-rh.ci</div>
</div>

<div id="app" class="hidden">
<div class="topbar"><div class="logo">◆ SGRHP<span class="b">Cible RH Emploi S.A.</span></div>
  <div style="font-size:13px"><span id="bell" style="cursor:pointer;margin-right:10px" onclick="showNotifs()">🔔</span><span id="who"></span> &nbsp;<button class="btn sm ghost" style="color:#fff;border-color:#ffffff55" onclick="logout()">Déconnexion</button></div></div>
<div class="layout">
  <div class="sidebar" id="nav"></div>
  <div class="main" id="view"></div>
</div>
</div>

<script>
let TOKEN = sessionStorage.getItem("t"), ME = JSON.parse(sessionStorage.getItem("me") || "null");

const api = async (path, opts = {}) => {
  const r = await fetch("/api" + path, { ...opts,
    headers: { ...(opts.body && !(opts.body instanceof FormData) ? { "Content-Type": "application/json" } : {}),
      Authorization: "Bearer " + TOKEN, ...(opts.headers || {}) } });
  if (r.status === 401) { logout(); throw new Error("Session expirée"); }
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || r.statusText);
  return j;
};

async function doLogin() {
  try {
    const r = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: lEmail.value.trim(), password: lPass.value }) });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error);
    TOKEN = j.token; ME = j.user;
    sessionStorage.setItem("t", TOKEN); sessionStorage.setItem("me", JSON.stringify(ME));
    boot();
  } catch (e) { lErr.textContent = e.message; lErr.classList.remove("hidden"); }
}
function logout() { sessionStorage.clear(); location.reload(); }

const NAV = [
  { k: "dash", label: "▦ Tableau de bord", roles: ["GPF","CD","RJ","UI","ADM"] },
  { k: "employees", label: "👥 Employés", roles: ["GPF","CD","RJ","ADM"] },
  { k: "queue", label: "✓ File de validation", roles: ["CD","RJ"] },
  { k: "fiches", label: "📋 Fiches de poste", roles: ["GPF","CD","RJ","ADM"] },
  { k: "grid", label: "💰 Grille salariale", roles: ["GPF","CD","ADM"] },
  { k: "career", label: "📈 Career & Perf.", roles: ["GPF","CD","RJ","ADM"] },
  { k: "reports", label: "📊 Reports & KPIs", roles: ["CD","RJ","ADM"] },
  { k: "generated", label: "🖨 Documents générés", roles: ["UI","ADM","CD","RJ"] },
  { k: "templates", label: "📄 Modèles", roles: ["ADM"] },
  { k: "settings", label: "🛠 Référentiels", roles: ["ADM"] },
  { k: "portfolios", label: "⚙ Config. portefeuilles", roles: ["ADM"] },
  { k: "users", label: "🔐 Utilisateurs", roles: ["ADM"] },
  { k: "audit", label: "🕘 Journal d'audit", roles: ["CD","RJ","ADM"] },
];
async function boot() {
  login.classList.add("hidden"); app.classList.remove("hidden");
  try { PFS = await api("/portfolios"); } catch {}
  who.textContent = `${ME.fullName} — ${ME.role}`;
  const items = NAV.filter(n => n.roles.includes(ME.role));
  nav.innerHTML = items.map(n => `<div class="nav" id="nav-${n.k}" onclick="go('${n.k}')">${n.label}</div>`).join("");
  go("dash");
}
function go(k) {
  document.querySelectorAll(".nav").forEach(e => e.classList.toggle("active", e.id === "nav-" + k));
  ({ employees, portfolios, users, audit: auditView, queue: queueView, generated: generatedView, templates: templatesView, settings: settingsView, dash: dashView, fiches: fichesView, grid: gridView, career: careerView, reports: reportsView, none }[k] || none)();
}
function none() { view.innerHTML = "<h1>Aucun module disponible pour ce rôle</h1><p></p>"; }

/* ---------- Employees ---------- */
async function employees() {
  const list = await api("/employees");
  const canEdit = ["GPF","ADM"].includes(ME.role);
  view.innerHTML = `<h1>Dossiers du personnel</h1>
    ${canEdit ? `<button class="btn p" style="margin-bottom:12px" onclick="empForm()">+ Nouveau dossier</button>` : ""}
    <div class="panel"><table><tr><th>Nom</th><th>Portefeuille</th><th>Contrat</th><th>Embauché</th><th>Pièces requises</th><th></th></tr>
    ${list.map(e => {
      const done = e.checklist.filter(c => c.uploaded).length, tot = e.checklist.length;
      return `<tr><td><b>${e.firstName} ${e.lastName}</b></td><td>${pfName(e.portfolioId)}</td>
      <td>${e.contract?.type || "—"}</td><td>${e.hireDate}</td>
      <td><span class="tag ${done === tot ? "green" : "amber"}">${done}/${tot}</span></td>
      <td><button class="btn ghost sm" onclick="empDetail('${e.id}')">Ouvrir</button></td></tr>`; }).join("")}
    </table></div>`;
}
let PFS = [];
const pfName = id => (PFS.find(p => p.id === id) || {}).name || id;

async function empForm() {
  PFS = await api("/portfolios");
  const [ctypes, sels, me, cnvs] = await Promise.all([
    api("/config/contract-types"), api("/config/salary-elements"), api("/me"), api("/config/conventions")]);
  window._CTYPES = ctypes; window._CNVS = cnvs;
  const myPfs = ME.role === "GPF" ? PFS.filter(p => (me.portfolioIds || []).includes(p.id)) : PFS;
  window._MYPFS = myPfs;
  if (!myPfs.length) return view.innerHTML = `<h1>Nouveau dossier employé</h1>
    <div class="note">No portfolio is linked to your account yet. Ask the administrator to link you to
    at least one portfolio (Users screen → 🔗 Gérer).</div>`;
  view.innerHTML = `<h1>Nouveau dossier employé</h1><div class="panel" style="max-width:720px">
    <div class="grid2"><div><label>Prénom</label><input id="fFirst"></div><div><label>Nom</label><input id="fLast"></div></div>
    <div class="grid3">
      <div><label>Portefeuille ${ME.role === "GPF" ? '<span class="tag gray">vos portefeuilles rattachés</span>' : ""}</label>
      <select id="fPf" onchange="syncCnv()">${myPfs.map(p => `<option value="${p.id}">${p.name}</option>`).join("")}</select></div>
      <div><label>Date d'embauche</label><input id="fHire" type="date"></div>
      <div><label>Type de contrat</label><select id="fCt" onchange="fEndWrap.classList.toggle('hidden', !(window._CTYPES.find(t=>t.name===this.value)||{}).fixedTerm)">
      ${ctypes.map(t => `<option>${t.name}</option>`).join("")}</select></div></div>
    <div id="fEndWrap" class="hidden"><label>Date de fin de contrat <span class="tag amber">obligatoire pour les contrats à durée déterminée</span></label><input id="fEnd" type="date" style="max-width:220px"></div>
    <div style="border:1px solid var(--border);border-radius:8px;padding:10px;margin:8px 0;background:#f8fafc">
      <label>Convention collective <span class="tag gray">issue du portefeuille sélectionné</span></label>
      <div id="fCnvName" style="font-weight:600;margin:4px 0 8px">—</div>
      <div class="grid2"><div><label>Catégorie (grille de la convention)</label>
        <select id="fCat"><option value="">— sélectionner —</option></select></div>
        <div><label>Échelon</label><input id="fStep" placeholder="e.g. 2"></div></div>
    </div>
    <div class="grid3">
      <div><label>Date de naissance</label><input id="fBirth" type="date"></div>
      <div><label>Lieu de naissance</label><input id="fBp"></div>
      <div><label>Situation matrimoniale</label><select id="fMs"><option>Single</option><option>Married</option><option>Divorced</option><option>Widowed</option></select></div></div>
    <div class="grid3">
      <div><label>Numéro CNI</label><input id="fCni"></div>
      <div><label>Validité CNI</label><input id="fCniExp" type="date"></div>
      <div><label>Numéro CNPS</label><input id="fCnps"></div></div>
    <div class="grid2">
      <div><label>Téléphone</label><input id="fPhone"></div>
      <div><label>Mode de paiement</label><select id="fPay"><option>TRANSFER</option><option>CHEQUE</option><option>CASH</option><option>ORANGE_MONEY</option><option>MOMO</option></select></div></div>
    <label>Personne à contacter en cas d'urgence</label>
    <div class="grid2"><input id="fEmgName" placeholder="Nom"><input id="fEmgTel" placeholder="Téléphone"></div>
    <div style="border:1px solid var(--border);border-radius:8px;padding:10px;margin:8px 0">
      <label>Éléments de salaire <span class="tag gray">cochez puis saisissez les montants (gérés par l'administrateur)</span></label>
      ${sels.map(s => `<div style="display:flex;gap:8px;align-items:center;margin-top:6px">
        <label class="chk" style="flex:1;padding:2px"><input type="checkbox" data-selname="${s.name}"
          onchange="this.closest('div').querySelector('[data-selamt]').classList.toggle('hidden', !this.checked)">
          <span>${s.name}</span></label>
        <input data-selamt="${s.name}" type="number" placeholder="Montant F CFA" class="hidden" style="max-width:170px;margin:0"></div>`).join("")}
    </div>
    <div class="err hidden" id="fErr"></div>
    <button class="btn p" onclick="empSave()">Créer le dossier</button>
    <button class="btn ghost" onclick="employees()">Annuler</button></div>`;
  syncCnv();
}
function syncCnv() {
  const pf = (window._MYPFS || []).find(p => p.id === fPf.value);
  const cnv = (window._CNVS || []).find(c => c.id === pf?.conventionId);
  fCnvName.textContent = cnv ? cnv.name : "No convention attached to this portfolio (admin: Portfolio Config)";
  const rows = (cnv?.grid || []).filter(g => g.baseSalary >= 0);
  fCat.innerHTML = '<option value="">— sélectionner —</option>' + rows.map(g =>
    `<option value="${g.category}">${g.category} — base ${Number(g.baseSalary).toLocaleString("fr-FR")} F CFA</option>`).join("");
}
async function empSave() {
  try {
    const e = await api("/employees", { method: "POST", body: JSON.stringify({
      firstName: fFirst.value, lastName: fLast.value, portfolioId: fPf.value,
      hireDate: fHire.value, birthDate: fBirth.value, birthPlace: fBp.value,
      maritalStatus: fMs.value, cniNumber: fCni.value, cniExpiry: fCniExp.value,
      cnpsNumber: fCnps.value, phone: fPhone.value,
      emergencyName: fEmgName.value, emergencyPhone: fEmgTel.value,
      emergencyContact: [fEmgName.value, fEmgTel.value].filter(Boolean).join(" — "),
      contract: { type: fCt.value, category: fCat.value || undefined, step: fStep.value || undefined,
        paymentMethod: fPay.value, startDate: fHire.value,
        endDate: (window._CTYPES.find(t=>t.name===fCt.value)||{}).fixedTerm ? fEnd.value : null },
      salary: Object.fromEntries([...view.querySelectorAll("[data-selname]")].filter(c => c.checked)
        .map(c => [c.dataset.selname, view.querySelector(`[data-selamt="${c.dataset.selname}"]`).value])) }) });
    empDetail(e.id);
  } catch (err) { fErr.textContent = err.message; fErr.classList.remove("hidden"); }
}

async function empDetail(id) {
  const e = await api("/employees/" + id);
  const canEdit = ["GPF","ADM"].includes(ME.role);
  view.innerHTML = `<button class="btn ghost sm" onclick="employees()">← Retour</button>
    <h1 style="margin-top:10px">${e.firstName} ${e.lastName}</h1>
    <div class="panel"><b style="font-size:12px;color:var(--muted)">PERSONAL & CONTRACT</b>
    <div class="grid3" style="margin-top:8px;font-size:13px">
      <div><label>Portefeuille</label><div>${pfName(e.portfolioId)}</div></div>
      <div><label>Embauché le</label><div>${e.hireDate}</div></div>
      <div><label>Né(e) le</label><div>${e.birthDate} — ${e.birthPlace || "—"}</div></div>
      <div><label>CNI</label><div>${e.cniNumber} (exp. ${e.cniExpiry})</div></div>
      <div><label>CNPS</label><div>${e.cnpsNumber || "—"}</div></div>
      <div><label>Personne à contacter en cas d'urgence</label><div>${e.emergencyName || e.emergencyContact || "—"}${e.emergencyPhone ? " · " + e.emergencyPhone : ""}</div></div>
      <div><label>Contrat</label><div>${e.contract?.type || "—"} · ${e.contract?.paymentMethod || ""}<br>
  <small style="color:var(--muted)">${e.contract?.type === "CDI" ? "durée indéterminée" : e.contract?.endDate ? "fin le " + e.contract.endDate : ""}</small></div></div>
    </div></div>
    <div class="note">Pièces obligatoires héritées du portefeuille <b>${pfName(e.portfolioId)}</b>. La CNI est obligatoire pour tous les portefeuilles. Every upload/download is logged.</div>
    <div class="panel">${e.checklist.map(c => `
      <div class="doc-row"><div><b>${c.code}.</b> ${c.label} <small style="color:var(--muted)">(${c.formats})</small>
        ${c.locked ? '<span class="tag red">OBLIGATOIRE</span>' : ""}</div>
      <div>${c.uploaded
        ? `<span class="tag green">Déposée ✓</span> ${fileBtns(e, c.code)}`
        : canEdit ? uploadForm(e.id, c.code) : '<span class="tag amber">Manquante</span>'}</div></div>`).join("")}
    </div>`;
}
const fileBtns = (e, code) => e.files.filter(f => f.docType === code)
  .map(f => `<button class="btn ghost sm" onclick="dl('${e.id}','${f.id}','${f.fileName}')">⬇ ${f.fileName}</button>`).join(" ");
const uploadForm = (empId, code) => `
  <form style="display:inline-flex;gap:6px;align-items:center" onsubmit="return up(event,'${empId}','${code}')">
    <input type="file" required style="width:180px;margin:0;padding:4px">
    ${code === "V" ? '<input type="date" required title="CNI expiry" style="width:130px;margin:0;padding:5px">' : ""}
    <button class="btn p sm">Déposer</button></form>`;
async function up(ev, empId, code) {
  ev.preventDefault();
  const inputs = ev.target.querySelectorAll("input");
  const fd = new FormData();
  fd.append("docType", code);
  if (code === "V") fd.append("expiryDate", inputs[1].value);
  fd.append("file", inputs[0].files[0]);
  try { await api(`/employees/${empId}/files`, { method: "POST", body: fd }); empDetail(empId); }
  catch (e) { alert(e.message); }
  return false;
}
async function dl(empId, fileId, name) {
  const r = await fetch(`/api/employees/${empId}/files/${fileId}/download`, { headers: { Authorization: "Bearer " + TOKEN } });
  const blob = await r.blob(); const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
}

/* ---------- Portfolio config (ADM) ---------- */
async function portfolios() {
  const [pfs, types, cnvs] = await Promise.all([api("/portfolios"), api("/portfolios/doc-types"), api("/config/conventions")]);
  PFS = pfs;
  const sel = window._pfSel || pfs[0].id;
  const pf = pfs.find(p => p.id === sel) || pfs[0];
  view.innerHTML = `<h1>Configuration des portefeuilles</h1>
    <div class="panel" style="max-width:640px"><b>Créer un portefeuille</b>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="npfName" placeholder="Portfolio name (e.g. ENEO Missions)" style="margin:0">
        <button class="btn p sm" onclick="pfCreate()">+ Créer</button></div>
      <small style="color:var(--muted)">CNI is included automatically and cannot be removed. Assign it to GPF users in the Users screen.</small>
      <div class="err hidden" id="npfErr"></div></div>
    <div class="note">⚠ CNI is mandatory for <b>all</b> portfolios and cannot be unchecked. Every change is traced in the audit log.</div>
    <div class="panel">
    <select style="max-width:280px" onchange="window._pfSel=this.value;portfolios()">
      ${pfs.map(p => `<option value="${p.id}" ${p.id === pf.id ? "selected" : ""}>${p.name}</option>`).join("")}</select>
    <div style="margin:10px 0;display:flex;gap:8px;align-items:center">
      <label style="margin:0">Convention collective rattachée</label>
      <select id="pfCnv" style="max-width:380px;margin:0">
        ${cnvs.map(c => `<option value="${c.id}" ${c.id === pf.conventionId ? "selected" : ""}>${c.name}</option>`).join("")}</select>
      <button class="btn ghost sm" onclick="pfCnvSave('${pf.id}')">Rattacher</button></div>
    <div class="grid2" style="margin-top:10px">${types.map(t => `
      <label class="chk"><input type="checkbox" data-code="${t.code}"
        ${t.code === "V" || pf.required.includes(t.code) ? "checked" : ""} ${t.code === "V" ? "disabled" : ""}>
        <span><b>${t.code}.</b> ${t.label} ${t.code === "V" ? '<span class="tag red">LOCKED</span>' : ""}</span></label>`).join("")}
    </div>
    <div class="err hidden" id="pErr"></div>
    <button class="btn p" style="margin-top:10px" onclick="pfSave('${pf.id}')">Enregistrer la configuration</button></div>`;
}
async function pfCnvSave(id) {
  try { await api(`/portfolios/${id}/convention`, { method: "PUT", body: JSON.stringify({ conventionId: pfCnv.value }) });
    alert("Convention rattachée — modification journalisée."); portfolios(); } catch (e) { alert(e.message); }
}
async function pfCreate() {
  try {
    const p = await api("/portfolios", { method: "POST", body: JSON.stringify({ name: npfName.value }) });
    window._pfSel = p.id; portfolios();
  } catch (e) { npfErr.textContent = e.message; npfErr.classList.remove("hidden"); }
}
async function pfSave(id) {
  const codes = [...view.querySelectorAll("input[data-code]")].filter(c => c.checked || c.disabled).map(c => c.dataset.code);
  try { await api(`/portfolios/${id}/requirements`, { method: "PUT", body: JSON.stringify({ required: codes }) });
    alert("Enregistré — modification journalisée."); }

async function openGen(id, print) {
  const r = await fetch(`/api/documents/${id}/download?print=${print}`, { headers: { Authorization: "Bearer " + TOKEN } });
  const blob = await r.blob(); const url = URL.createObjectURL(blob);
  const cd = r.headers.get("Content-Disposition") || "";
  const isDocx = cd.includes(".docx");
  if (print && !isDocx) { const w = window.open(url); if (w) w.onload = () => w.print(); return; }
  const a = document.createElement("a");
  a.href = url; a.download = (cd.match(/filename="?([^";]+)/) || [,"document"])[1]; a.click();
}

}

  const refs = await api("/referentials");
  view.innerHTML = `<h1>Référentiels — paramètres de génération</h1>
  <div class="note">These lists feed the document-generation form: any referential <b>linked to a template tag</b>
  becomes a dropdown for that field (e.g. Conventions collectives → {{collective_agreement}}).</div>
  <div class="panel" style="max-width:680px"><b>Nouveau référentiel</b>
    <div class="grid3" style="margin-top:8px">
      <input id="rKey" placeholder="key (e.g. bonuses)" style="margin:0">
      <input id="rLabel" placeholder="Label (e.g. Primes)" style="margin:0">
      <input id="rTag" placeholder="Template tag (optional)" style="margin:0"></div>
    <div class="err hidden" id="rErr"></div>
    <button class="btn p sm" style="margin-top:8px" onclick="refCreate()">+ Créer</button></div>
  <div class="grid2">
  ${refs.map(r => `<div class="panel"><b>${r.label}</b>
    ${r.tag ? `<span class="tag gray">→ {{${r.tag}}}</span>` : '<span class="tag amber">not rattaché(s)</span>'}
    <div style="margin:8px 0">${r.values.map(v => `<span class="tag gray" style="margin:2px">${v}
      <a style="cursor:pointer;color:var(--red)" onclick="refDel('${r.key}','${v.replace(/'/g,"\\'")}')">✕</a></span>`).join(" ")}</div>
    <div style="display:flex;gap:6px"><input id="add-${r.key}" placeholder="Ajouter une valeur…" style="margin:0">
    <button class="btn ghost sm" onclick="refAdd('${r.key}')">Ajouter</button></div></div>`).join("")}
  </div>`;
}
async function refCreate() {
  try { await api("/referentials", { method: "POST", body: JSON.stringify({
    key: rKey.value.trim(), label: rLabel.value.trim(), tag: rTag.value.trim() }) }); settingsView(); }
  catch (e) { rErr.textContent = e.message; rErr.classList.remove("hidden"); }
}
async function refAdd(key) {
  const inp = document.getElementById("add-" + key);
  if (!inp.value.trim()) return;
  const refs = await api("/referentials");
  const r = refs.find(x => x.key === key);
  await api(`/referentials/${key}`, { method: "PUT", body: JSON.stringify({ values: [...r.values, inp.value.trim()] }) });
  settingsView();
}
async function refDel(key, val) {
  const refs = await api("/referentials");
  const r = refs.find(x => x.key === key);
  const values = r.values.filter(v => v !== val);
  if (!values.length) return alert("A referential must keep at least one value.");
  await api(`/referentials/${key}`, { method: "PUT", body: JSON.stringify({ values }) });
  settingsView();
}

async function amCreate(id) {
  try {
    await api(`/hr/${id}/amendments`, { method: "POST", body: JSON.stringify({
      avenantType: amType.value, changes: { [amField.value]: amValue.value }, effectiveDate: amDate.value, reason: amReason.value }) });
    alert("Avenant soumis — chronomètre de 48h démarré. Il sera appliqué au contrat après validation du RJ.");
    empDetail(id);
  } catch (e) { alert(e.message); }
}
async function decCreate(id) {
  try {
    const fd = new FormData();
    fd.append("type", decType.value); fd.append("detail", decDetail.value); fd.append("date", decDate.value);
    if (decFile.files[0]) fd.append("file", decFile.files[0]);
    if (!decSal.classList.contains("hidden")) {
      if (decCat.value) fd.append("newCategory", decCat.value);
      if (decSalEl.value && decSalAmt.value) fd.append("salaryChanges", JSON.stringify({ [decSalEl.value]: Number(decSalAmt.value) }));
    }
    const r = await api(`/hr/${id}/decisions`, { method: "POST", body: fd });
    if (r.amendmentId) alert("Décision enregistrée + avenant salarial créé automatiquement (en attente de validation CD).");
    empDetail(id);
  } catch (e) { alert(e.message); }
}
async function lvCreate(id) {
  try { await api(`/hr/${id}/leave`, { method: "POST", body: JSON.stringify({
      leaveType: lvType.value, startDate: lvStart.value, endDate: lvEnd.value, reason: lvReason.value }) });
    alert("Demande soumise pour validation."); empDetail(id); }
  catch (e) { alert(e.message); }
}

    const [match, succ] = await Promise.all([api("/career/matching"), api("/career/succession")]);
    P.innerHTML = `<div class="grid2">
      <div class="panel"><b>🔮 Rapprochement prédictif — suggestions de mobilité interne</b>
        ${match.length ? match.map(m => `<div class="doc-row"><div><b>${m.employee}</b> → ${m.keyPosition}</div>
          <span class="tag ${m.score >= 75 ? "green" : "amber"}">${m.score}% match</span></div>`).join("")
        : '<small style="color:var(--muted)">No matches yet — fill career plans (preferences, potential) and create key positions in Succession.</small>'}</div>
      <div class="panel"><b>🗝 Postes clés</b>
        ${succ.length ? succ.map(s => `<div class="doc-row"><div>${s.keyPosition}</div>
          <span class="tag ${s.criticité === "HIGH" ? "red" : s.criticité === "MEDIUM" ? "amber" : "green"}">${s.criticité}</span>
          <span class="tag gray">${s.successors.length} successor(s)</span></div>`).join("") : '<small style="color:var(--muted)">Aucun défini.</small>'}</div></div>`;
  }

  if (k === "plan") {
    const [plan, paths] = await Promise.all([api(`/career/plans/${CAR_EMP}`), api("/career/paths")]);
    const p = plan || {};
    P.innerHTML = `<div class="panel" style="max-width:720px">
      <div class="grid2">
        <div><label>Postes souhaités (séparés par des virgules)</label><input id="cpPos" value="${(p.preferredPositions||[]).join(", ")}" ${canEdit?"":"disabled"}></div>
        <div><label>Lieux souhaités</label><input id="cpLoc" value="${(p.preferredLocations||[]).join(", ")}" ${canEdit?"":"disabled"}></div>
        <div><label>Disponibilité</label><input id="cpAv" value="${p.availability||""}" placeholder="e.g. mobile national" ${canEdit?"":"disabled"}></div>
        <div><label>Matrice de potentiel (1–9)</label><select id="cpPot" ${canEdit?"":"disabled"}><option value="">—</option>
          ${[1,2,3,4,5,6,7,8,9].map(n => `<option ${p.potential==n?"selected":""}>${n}</option>`).join("")}</select></div>
        <div><label>Parcours de carrière</label><select id="cpPath" ${canEdit?"":"disabled"}><option value="">—</option>
          ${paths.map(c => `<option value="${c.id}" ${p.careerPathId===c.id?"selected":""}>${c.name}</option>`).join("")}</select></div>
        <div><label>Formations (séparées par des virgules)</label><input id="cpTr" value="${(p.trainings||[]).join(", ")}" ${canEdit?"":"disabled"}></div>
      </div>
      ${p.careerPathId ? `<div class="note">Path: ${(paths.find(c=>c.id===p.careerPathId)||{}).stages?.join(" → ")||""}</div>` : ""}
      ${canEdit ? `<button class="btn p" onclick="cpSave()">Enregistrer le plan de carrière</button>` : ""}</div>`;
  }

  if (k === "okr") {
    const okrs = await api(`/career/okr/${CAR_EMP}`);
    P.innerHTML = `${canEdit ? `<div class="panel" style="max-width:720px"><b>New OKR</b>
      <div class="grid2" style="margin-top:6px"><input id="okPeriod" placeholder="Période (ex. T3 2026)" style="margin:0">
      <input id="okObj" placeholder="Objectif" style="margin:0"></div>
      <input id="okKrs" placeholder="Key results, separated by ; (e.g. Réduire incidents 20%; Certifier 2 équipements)" style="margin-top:6px">
      <button class="btn p sm" onclick="okCreate()">+ Créer OKR</button></div>` : ""}
      ${okrs.map(o => `<div class="panel"><b>${o.objective}</b> <span class="tag gray">${o.period}</span>
        ${o.keyResults.map((kr, i) => `<div style="margin-top:8px"><small>${kr.title}</small>
          <div style="display:flex;gap:8px;align-items:center">
          <div class="bar" style="flex:1;height:8px;border-radius:4px;background:#e5e7eb;overflow:hidden"><div style="height:100%;width:${kr.progress}%;background:${kr.progress>=70?"var(--green)":kr.progress>=40?"var(--amber)":"var(--red)"}"></div></div>
          ${canEdit ? `<input type="number" min="0" max="100" value="${kr.progress}" data-okr="${o.id}" data-i="${i}" style="max-width:80px;margin:0">` : `<b>${kr.progress}%</b>`}</div></div>`).join("")}
        ${canEdit ? `<button class="btn ghost sm" style="margin-top:8px" onclick="okProg('${o.id}')">Mettre à jour l'avancement</button>` : ""}</div>`).join("") || "<div class='panel'>Aucun OKR pour le moment.</div>"}`;
  }

  if (k === "e360") {
    const evs = (await api("/career/eval360")).filter(e => e.employeeId === CAR_EMP);
    P.innerHTML = `${canMgr ? `<div class="panel" style="max-width:760px"><b>Nouvelle campagne 360°</b>
      <input id="evName" placeholder="Nom de la campagne" style="margin-top:6px">
      <input id="evCrit" placeholder="Criteria separated by ; (e.g. Communication; Technique; Leadership)">
      <input id="evPeople" placeholder="Evaluators: name:role separated by ; roles = manager/peer/subordinate/self (e.g. J-M Tano:manager; A Kaboré:peer; K Ouattara:self)">
      <button class="btn p sm" onclick="evCreate()">+ Lancer la campagne</button></div>` : ""}
      ${await Promise.all(evs.map(async ev => {
        const full = await api(`/career/eval360/${ev.id}`);
        return `<div class="panel"><b>${ev.name}</b> <span class="tag ${ev.status === "COMPLETE" ? "green" : "amber"}">${ev.status}</span>
        <span class="tag gray">${full.consolidated.submitted}/${full.consolidated.total} submitted</span>
        ${full.consolidated.overall ? `<span class="tag blue">overall ${full.consolidated.overall}/5</span>` : ""}
        <table style="margin-top:8px"><tr><th>Évaluateur</th><th>Rôle</th><th>Statut</th><th></th></tr>
        ${ev.evaluators.map((e, i) => `<tr><td>${e.name}</td><td><span class="tag gray">${e.role}</span></td>
          <td>${e.submittedAt ? '<span class="tag green">Transmis</span>' : '<span class="tag amber">En attente</span>'}</td>
          <td>${!e.submittedAt ? `<button class="btn ghost sm" onclick="evSubmit('${ev.id}',${i},${ev.criteria.length})">Saisir les notes</button>` : ""}</td></tr>`).join("")}</table>
        ${full.consolidated.overall ? `<div style="margin-top:8px">${full.consolidated.byCriterion.map(c =>
          `<span class="tag gray" style="margin:2px">${c.criterion}: <b>${c.average}/5</b></span>`).join(" ")}</div>` : ""}</div>`;
      })).then(a => a.join("")) || ""}`;
  }

  if (k === "meet") {
    const [chk, itv] = await Promise.all([api(`/career/checkins/${CAR_EMP}`), api(`/career/interviews/${CAR_EMP}`)]);
    P.innerHTML = `<div class="grid2">
      <div class="panel"><b>🔄 Points réguliers</b>
        ${canEdit ? `<div style="display:flex;gap:6px;margin:8px 0"><input id="ckNotes" placeholder="Notes" style="margin:0">
          <input id="ckNext" type="date" title="Next check-in" style="max-width:150px;margin:0">
          <button class="btn p sm" onclick="ckAdd()">+ Enregistrer</button></div>` : ""}
        ${chk.map(c => `<div class="doc-row"><div><b>${c.date}</b> — ${c.notes || "—"}<br>
          <small style="color:var(--muted)">by ${c.managerName}${c.nextDate ? " · next: " + c.nextDate : ""}</small></div></div>`).join("") || "<small style='color:var(--muted)'>Aucun.</small>"}</div>
      <div class="panel"><b>📝 Entretiens dématérialisés (signature électronique)</b>
        ${canMgr ? `<div style="display:flex;gap:6px;margin:8px 0;flex-wrap:wrap">
          <select id="itType" style="max-width:200px;margin:0"><option>Entretien annuel</option><option>Entretien professionnel</option></select>
          <input id="itSum" placeholder="Synthèse" style="margin:0"><button class="btn p sm" onclick="itAdd()">+ Créer</button></div>` : ""}
        ${itv.map(it => `<div class="doc-row"><div><b>${it.type}</b> — ${it.date}
          ${it.status === "SIGNED_ARCHIVED" ? '<span class="tag green">Signed & archived ✓</span>' : '<span class="tag amber">En attente de signatures</span>'}<br>
          <small style="color:var(--muted)">${it.summary || ""}</small><br>
          <small>Manager: ${it.signatures.manager ? "✓ " + it.signatures.manager.name : "—"} · Employee: ${it.signatures.employee ? "✓ " + it.signatures.employee.name : "—"}</small></div>
          <div>${!it.signatures.manager && canMgr ? `<button class="btn ghost sm" onclick="itSign('${it.id}','manager')">Signer (responsable)</button>` : ""}
          ${!it.signatures.employee && canEdit ? `<button class="btn ghost sm" onclick="itSign('${it.id}','employee')">Signer (employé)</button>` : ""}</div></div>`).join("") || "<small style='color:var(--muted)'>Aucun.</small>"}</div></div>`;
  }

  if (k === "succ") {
    const [succ, emps] = await Promise.all([api("/career/succession"), api("/employees")]);
    P.innerHTML = `${canMgr ? `<div class="panel" style="max-width:720px"><b>Nouveau poste clé</b>
      <div style="display:flex;gap:6px;margin-top:6px"><input id="spPos" placeholder="Key position (e.g. Superviseur de site)" style="margin:0">
      <select id="spCrit" style="max-width:140px;margin:0"><option>HIGH</option><option>MEDIUM</option><option>LOW</option></select>
      <button class="btn p sm" onclick="spAdd()">+ Add</button></div></div>` : ""}
      ${succ.map(s => `<div class="panel"><b>${s.keyPosition}</b>
        <span class="tag ${s.criticité === "HIGH" ? "red" : s.criticité === "MEDIUM" ? "amber" : "green"}">criticité ${s.criticité}</span>
        ${canMgr ? `<div style="display:flex;gap:6px;margin:8px 0">
          <select id="su-${s.id}" style="max-width:220px;margin:0">${emps.map(e => `<option value="${e.id}">${e.firstName} ${e.lastName}</option>`).join("")}</select>
          <select id="sr-${s.id}" style="max-width:170px;margin:0"><option value="READY_NOW">Prêt maintenant</option><option value="READY_1_2Y">Prêt sous 1–2 ans</option><option value="TO_DEVELOP">À développer</option></select>
          <button class="btn ghost sm" onclick="spSucc('${s.id}')">+ Successeur</button></div>` : ""}
        ${s.successors.map(x => { const e = emps.find(z => z.id === x.employeeId);
          return `<div class="doc-row"><div>${e ? e.firstName + " " + e.lastName : x.employeeId}</div>${RD_TAG(x.readiness)}</div>`; }).join("")
        || "<small style='color:var(--muted)'>Aucun successeur identifié.</small>"}</div>`).join("") || ""}`;
  }
}
async function cpSave() {
  const split = v => v.split(",").map(s => s.trim()).filter(Boolean);
  try { await api(`/career/plans/${CAR_EMP}`, { method: "PUT", body: JSON.stringify({
    preferredPositions: split(cpPos.value), preferredLocations: split(cpLoc.value),
    availability: cpAv.value, potential: cpPot.value ? Number(cpPot.value) : undefined,
    careerPathId: cpPath.value || undefined, trainings: split(cpTr.value) }) });
    alert("Plan de carrière saved."); careerTab("plan"); } catch (e) { alert(e.message); }
}
async function okCreate() {
  try { await api(`/career/okr/${CAR_EMP}`, { method: "POST", body: JSON.stringify({
    period: okPeriod.value, objective: okObj.value,
    keyResults: okKrs.value.split(";").map(s => ({ title: s.trim() })).filter(k => k.title) }) });
    careerTab("okr"); } catch (e) { alert(e.message); }
}
async function okProg(okrId) {
  const updates = [...document.querySelectorAll(`input[data-okr="${okrId}"]`)].map(i => ({ index: Number(i.dataset.i), progress: Number(i.value) }));
  try { await api(`/career/okr/${okrId}/progress`, { method: "PUT", body: JSON.stringify({ updates }) }); careerTab("okr"); }
  catch (e) { alert(e.message); }
}
async function evCreate() {
  try { await api("/career/eval360", { method: "POST", body: JSON.stringify({
    employeeId: CAR_EMP, name: evName.value,
    criteria: evCrit.value.split(";").map(s => s.trim()).filter(Boolean),
    evaluators: evPeople.value.split(";").map(s => { const [name, role] = s.split(":").map(x => x.trim()); return { name, role }; }).filter(e => e.name && e.role) }) });
    careerTab("e360"); } catch (e) { alert(e.message); }
}
async function evSubmit(id, idx, n) {
  const raw = prompt(`Notes de 1 à 5 pour les ${n} critères, séparées par ; (ex. 4;3;5)`);
  if (raw === null) return;
  const scores = raw.split(";").map(s => Number(s.trim()));
  const comment = prompt("Commentaire (facultatif)") || "";
  try { await api(`/career/eval360/${id}/submit`, { method: "POST", body: JSON.stringify({ evaluatorIndex: idx, scores, comment }) });
    careerTab("e360"); } catch (e) { alert(e.message); }
}
async function ckAdd() {
  try { await api(`/career/checkins/${CAR_EMP}`, { method: "POST", body: JSON.stringify({ notes: ckNotes.value, nextDate: ckNext.value || null }) });
    careerTab("meet"); } catch (e) { alert(e.message); }
}
async function itAdd() {
  try { await api(`/career/interviews/${CAR_EMP}`, { method: "POST", body: JSON.stringify({ type: itType.value, summary: itSum.value }) });
    careerTab("meet"); } catch (e) { alert(e.message); }
}
async function itSign(id, as) {
  const name = prompt(`Signature électronique — saisissez le nom complet (${as}) pour signer (identité et horodatage enregistrés) :`);
  if (!name) return;
  try { await api(`/career/interviews/${id}/sign`, { method: "POST", body: JSON.stringify({ as, signedName: name }) });
    careerTab("meet"); } catch (e) { alert(e.message); }
}
async function spAdd() {
  try { await api("/career/succession", { method: "POST", body: JSON.stringify({ keyPosition: spPos.value, criticité: spCrit.value }) });
    careerTab("succ"); } catch (e) { alert(e.message); }
}
async function spSucc(id) {
  try { await api(`/career/succession/${id}/successors`, { method: "POST", body: JSON.stringify({
    employeeId: document.getElementById("su-" + id).value, readiness: document.getElementById("sr-" + id).value }) });
    careerTab("succ"); } catch (e) { alert(e.message); }
}


/* ================= M6: Reports & analytics ================= */
let REP_KEY = "kpis";
const bar = (pct, color) => `<div style="height:8px;border-radius:4px;background:#e5e7eb;overflow:hidden">
  <div style="height:100%;width:${Math.min(100, pct)}%;background:${color}"></div></div>`;

async function reportsView() {
  const list = await api("/reports");
  const r = await api("/reports/" + REP_KEY);
  const d = r.data;
  let body = "";

  if (REP_KEY === "kpis") {
    const maxP = Math.max(...Object.values(d.buckets), 1);
    body = `<div class="cards">
      <div class="card"><div class="kpi">${d.headcount}</div><div class="lbl">Effectif total</div></div>
      <div class="card"><div class="kpi">${(d.payroll/1000).toFixed(0)}k</div><div class="lbl">Masse salariale (FCFA/mois)</div></div>
      <div class="card"><div class="kpi">${d.turnover}%</div><div class="lbl">Turnover</div></div>
      <div class="card"><div class="kpi">${d.absenteeism}%</div><div class="lbl">Absentéisme</div></div>
      <div class="card"><div class="kpi">${d.generatedDocs}</div><div class="lbl">Documents générés</div></div>
    </div>
    <div class="grid2">
      <div class="panel"><b>Pyramide des âges</b>
        ${Object.entries(d.buckets).reverse().map(([k,v]) => `<div style="margin-top:8px"><small>${k} — ${v}</small>
          ${bar(v/maxP*100, "var(--primary)")}</div>`).join("")}</div>
      <div class="panel"><b>Effectifs par portefeuille</b>
        ${d.byPortfolio.map(p => `<div class="doc-row"><div>${p.name}</div><span class="tag gray">${p.count}</span></div>`).join("")}</div>
      <div class="panel"><b>Par type de contrat</b>
        ${Object.entries(d.byContract).map(([k,v]) => `<div class="doc-row"><div>${k}</div><span class="tag blue">${v}</span></div>`).join("")}</div>
      <div class="panel"><b>Par catégorie conventionnelle</b>
        ${Object.entries(d.byCategory).map(([k,v]) => `<div class="doc-row"><div>${k}</div><span class="tag gray">${v}</span></div>`).join("")}</div>
    </div>`;
  }

  if (REP_KEY === "compliance") {
    const col = d.score >= 85 ? "var(--green)" : d.score >= 60 ? "var(--amber)" : "var(--red)";
    body = `<div class="cards">
      <div class="card"><div class="kpi" style="color:${col}">${d.score}/100</div><div class="lbl">Score de conformité</div></div>
      <div class="card"><div class="kpi" style="color:var(--red)">${d.counts.HIGH}</div><div class="lbl">Anomalies critiques</div></div>
      <div class="card"><div class="kpi" style="color:var(--amber)">${d.counts.MEDIUM}</div><div class="lbl">Anomalies moyennes</div></div>
      <div class="card"><div class="kpi">${d.counts.LOW}</div><div class="lbl">Anomalies mineures</div></div></div>
      <div class="panel"><table><tr><th>Employé</th><th>Gravité</th><th>Anomalie</th></tr>
      ${d.issues.map(i => `<tr><td>${i.employee}</td>
        <td><span class="tag ${i.severity==="HIGH"?"red":i.severity==="MEDIUM"?"amber":"gray"}">${i.severity}</span></td>
        <td>${i.issue}</td></tr>`).join("") || "<tr><td colspan=3>Aucune anomalie 🎉</td></tr>"}</table></div>`;
  }

  if (REP_KEY === "evaluation") {
    body = `<div class="note">Indicateurs calculés à partir du journal d'audit et des étapes de workflow (§4.3).</div>
      <div class="panel"><table><tr><th>Utilisateur</th><th>Rôle</th><th>Soumis / Décidés</th><th>Taux de rejet</th>
      <th>Resoumissions</th><th>Délai moyen</th><th>Dépassements</th><th>Motif récurrent</th></tr>
      ${d.map(r => `<tr><td>${r.user}</td><td><span class="tag gray">${r.role}</span></td>
        <td>${r.submitted ?? r.decided ?? "—"}</td>
        <td><span class="tag ${r.rejectionRate>20?"red":r.rejectionRate>10?"amber":"green"}">${r.rejectionRate}%</span></td>
        <td>${r.resubmissions ?? "—"}</td>
        <td>${r.avgDelayH !== null && r.avgDelayH !== undefined ? `<span class="tag ${r.avgDelayH>36?"red":r.avgDelayH>24?"amber":"green"}">${r.avgDelayH}h / 48h</span>` : "—"}</td>
        <td>${r.breaches ?? "—"}</td><td style="font-size:12px">${r.topRejectReason}</td></tr>`).join("")}</table></div>`;
  }

  if (REP_KEY === "sla") {
    body = `<div class="panel"><table><tr><th>Document</th><th>Étape</th><th>Cycle</th><th>Assigné</th><th>Décision</th><th>Heures</th><th>Motif</th></tr>
      ${d.map(r => `<tr><td>${r.document}</td><td><span class="tag gray">${r.stage}</span></td><td>${r.cycle}</td>
        <td>${r.assigned}</td><td>${r.decision === "APPROVED" ? '<span class="tag green">Validé</span>' :
          r.decision === "REJECTED" ? '<span class="tag red">Rejeté</span>' : '<span class="tag amber">En cours</span>'}</td>
        <td>${r.breach ? `<span class="tag red">${r.elapsedH}h ⚠</span>` : `<span class="tag green">${r.elapsedH}h</span>`}</td>
        <td style="font-size:12px;color:var(--red)">${r.reason}</td></tr>`).join("") || "<tr><td colspan=7>Aucune donnée.</td></tr>"}</table></div>`;
  }

  if (REP_KEY === "headcount") {
    body = `<div class="panel"><table><tr>${Object.keys(d[0]||{nom:""}).map(k => `<th>${k}</th>`).join("")}</tr>
      ${d.map(row => `<tr>${Object.values(row).map(v => `<td>${v}</td>`).join("")}</tr>`).join("")}</table></div>`;
  }

  view.innerHTML = `<h1>Reports & KPIs</h1>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <select style="max-width:340px;margin:0" onchange="REP_KEY=this.value;reportsView()">
      ${list.map(x => `<option value="${x.key}" ${x.key===REP_KEY?"selected":""}>${x.label}</option>`).join("")}</select>
    <button class="btn p sm" onclick="repExport('pdf')">⬇ Export PDF</button>
    <button class="btn ghost sm" onclick="repExport('xlsx')">⬇ Export Excel</button>
  </div>${body}`;
}
async function repExport(fmt) {
  const r = await fetch(`/api/reports/${REP_KEY}/export?format=${fmt}`, { headers: { Authorization: "Bearer " + TOKEN } });
  if (!r.ok) return alert("Échec de l'export");
  const blob = await r.blob(); const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = `${REP_KEY}.${fmt}`; a.click();
}

</script>
</body>
</html>
